spring:
  application:
    name: maismaes

  datasource:
    url: jdbc:mysql://localhost:3306/maismaes_db
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

security:
  secret: maismaes