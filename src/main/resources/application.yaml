server:
  port: 8080

spring:
  application:
    name: maismaes

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://localhost:3306/maismaes_db
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://chatuser:chatpass@localhost:27017/chatdb?authSource=admin}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

security:
  secret: maismaes

mail:
  api:
    url: ${MAIL_API_URL:http://localhost:8088/v1/api-mensagens}

recuperacao-senha:
  expiracao-minutos: 10

admin:
  email: ${ADMIN_EMAIL:alissongabriel010907@gmail.com}

denuncia:
  limiar-notificacao: ${DENUNCIA_LIMIAR_NOTIFICACAO:1}

logging:
  level:
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    org.springframework.web.socket.messaging: DEBUG
    com.maismaes.com.br.controller.ChatController: DEBUG
    com.maismaes.com.br.config.WebSocketEventListener: DEBUG

