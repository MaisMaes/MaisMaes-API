server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: maismaes

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: ${MONGODB_URI}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

security:
  secret: ${SECURITY_SECRET}

mail:
  api:
    url: ${MAIL_API_URL}

recuperacao-senha:
  expiracao-minutos: 10

admin:
  email: ${ADMIN_EMAIL}

denuncia:
  limiar-notificacao: ${DENUNCIA_LIMIAR_NOTIFICACAO:1}

logging:
  level:
    root: INFO
    org.springframework.web.socket: WARN
    org.springframework.messaging: WARN
    org.springframework.web.socket.messaging: WARN
    com.maismaes.com.br.controller.ChatController: INFO
    com.maismaes.com.br.config.WebSocketEventListener: INFO

